# ============================================================================
# Validation Flow
# ============================================================================

validation:
  when_validated:
    - "record new (always)"
    - "record update (always)"
    - "note add (always)"
  when_not_validated:
    - "reindex (loads without validation)"
    - "from_markdown (parsing only)"
  validation_methods:
    - "ProjectConfig.validate_field() - check accepted_values"
    - "ProjectConfig.validate_required_fields() - check required present"
    - "IncidentManager._validate_incident_fields() - full validation"

