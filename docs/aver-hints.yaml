# ============================================================================
# IMPORTANT: Record Storage Behavior
# ============================================================================

critical_notes:
  record_as_note:
    description: |
      When a record is created, aver stores the initial record content
      as a NOTE in the updates/ directory, not in the records/ file.
      
      File structure:
        records/REC-001.md     - Contains only metadata (frontmatter)
        updates/REC-001/
          NT-001.md            - The actual record content (first "note")
          NT-002.md            - First actual comment/note
          NT-003.md            - Second comment/note
      
      This means:
      - A "new" record has 1 note (the record itself)
      - Adding a comment creates the 2nd note
      - note list REC-001 will show NT-001 (the record) + any comments
      - Test assertions should expect N+1 notes (record + N comments)
    
    implications:
      - "Record with no notes" is impossible - minimum is 1 (the record)
      - Reindex output: "1 notes" for a record with no comments
      - Note count tests: If you add 2 comments, expect "3 notes" total
    
    example_test_fix: |
      # WRONG:
      if echo "$output" | grep -q "2 notes"; then  # Added 2 comments
      
      # CORRECT:
      if echo "$output" | grep -q "3 notes"; then  # 1 record + 2 comments

