    description: "Update KV fields"
    pattern: |
      kv_updates = {}
      if args.text_updates:
          for key, value in args.text_updates:
              # Parse and update
  
  json_io_command:
    description: "Send command via JSON IO"
    pattern: |
      request = {"command": "export-record", "params": {"record_id": "ISS-001"}}
      process.stdin.write(json.dumps(request) + "\n")
      response = json.loads(process.stdout.readline())

# ============================================================================
# Validation Flow
# ============================================================================

validation:
  when_validated:
    - "record new (always)"
    - "record update (always)"
    - "note add (always)"
  when_not_validated:
    - "reindex (loads without validation)"
    - "from_markdown (parsing only)"
  validation_methods:
    - "ProjectConfig.validate_field() - check accepted_values"
    - "ProjectConfig.validate_required_fields() - check required present"
    - "IncidentManager._validate_incident_fields() - full validation"

