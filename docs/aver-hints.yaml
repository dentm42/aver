# ============================================================================
# Important Constants
# ============================================================================

constants:
  file_locations:
    config_path: ".aver/config.toml"
    index_db: ".aver/aver.db"
    records_dir: "records/"
    updates_dir: "updates/"
  
  id_formats:
    record_default: "REC-XXXXXX (base32)"
    note_default: "NT-XXXXXX (base32)"
    custom_allowed: "A-Z, a-z, 0-9, _, -"
  
  search_operators:
    - "= (equals)"
    - "!= (not equals)"
    - "> (greater than)"
    - "< (less than)"
    - ">= (greater or equal)"
    - "<= (less or equal)"
  
  type_hints:
    suffix: "__"
    formats:
      - "field__string"
      - "field__integer"
      - "field__float"

