# ============================================================================
# Important Constants
# ============================================================================

constants:
  file_locations:
    config_path: ".aver/config.toml"
    index_db: ".aver/aver.db"
    records_dir: "records/"
    updates_dir: "updates/"
  
  id_formats:
    record_default: "REC-XXXXXX (base32)"
    note_default: "NT-XXXXXX (base32)"
    custom_allowed: "A-Z, a-z, 0-9, _, -"
  
  search_operators:
    - "= (equals)"
    - "!= (not equals)"
    - "> (greater than)"
    - "< (less than)"
    - ">= (greater or equal)"
    - "<= (less or equal)"
    - "^ (in: pipe-delimited values, e.g. status^open|closed|resolved)"

  system_values:
    - "datetime — YYYY-MM-DD HH:MM:SS"
    - "datestamp — YYYY-MM-DD"
    - "user_name — user handle"
    - "user_email — user email"
    - "recordid — record ID"
    - "updateid — note ID"
    - "template_id — template name"

  database_tables:
    file_index: "id INTEGER PK AUTOINCREMENT, file_path TEXT UNIQUE, file_hash TEXT, file_mtime TEXT"
    incidents_fts: "FTS5 virtual table: incident_id UNINDEXED, source, source_id UNINDEXED, content"
    kv_store: "id INTEGER PK, incident_id TEXT, update_id TEXT, key TEXT, value_string/integer/float, created_at TEXT"
    note: "incidents_index was removed/migrated to file_index in 2026-02-27"
  
  type_hints:
    suffix: "__"
    formats:
      - "field__string"
      - "field__integer"
      - "field__float"

