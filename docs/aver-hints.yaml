# ============================================================================
# Recent Features (Track Changes)
# ============================================================================

recent_additions:
  - feature: "--offset pagination for record list, note search, json search-records, json search-notes"
    added: "2026-03-01"
    status: "✅ IMPLEMENTED"
    semantics: |
      All list/search commands now accept --offset N (default 0) to skip the first N
      results. Combined with --limit for cursor-style pagination.
      Slice logic: results[offset:offset+limit]. None limit (json search-notes legacy)
      handled as results[offset:].
      Bug fixed: json search-notes CLI --ksearch was passed as a bare string to
      search_updates(); now wrapped in a list in _cmd_json_search_notes.
    commands:
      - "aver record list --ksearch ... --limit N --offset N"
      - "aver note search --ksearch ... --limit N --offset N"
      - "aver json search-records --ksearch ... --limit N --offset N"
      - "aver json search-notes --ksearch ... --limit N --offset N"
    json_io_params:
      - '{"command":"search-records","params":{"ksearch":"...","limit":N,"offset":N}}'
      - '{"command":"search-notes","params":{"ksearch":"...","limit":N,"offset":N}}'
    key_methods:
      - "list_incidents(offset=0) — slice [offset:offset+limit]"
      - "search_updates(offset=0) — slice [offset:offset+limit] or [offset:] if limit=None"

  - feature: "--help-fields on record new and record update; --template on record update"
    added: "2026-03-01"
    status: "✅ IMPLEMENTED"
    semantics: |
      record new --help-fields: lists editable fields for creation (template-aware if --template given).
      record update RECORD_ID --help-fields: lists editable fields for that record's current template.
      record update now accepts --template TEMPLATE_ID for field-scope enforcement only
      (does NOT copy content from any record, unlike record new --template).
      Template change validation (editable check) enforced for both --help-fields preview and
      actual update via _resolve_template_id() as single source of truth.
    key_methods:
      - "_show_record_fields_help(manager, template_id, context)"
      - "_show_record_fields_help_new(args)"
      - "_show_record_fields_help_update(args) — delegates to _resolve_template_id"

  - feature: "note add --no-validation-editor"
    added: "2026-03-01"
    status: "✅ IMPLEMENTED"
    semantics: |
      Suppresses editor launch in automation contexts. If --message or stdin not provided,
      errors immediately rather than opening an editor.
    command: "aver note add RECORD_ID --no-validation-editor --message 'text'"

  - feature: "record unmask / note unmask commands"
    commands:
      - "aver record unmask RECORD_ID --fields 'f1,f2'"
      - "aver note unmask RECORD_ID NOTE_ID --fields 'f1,f2'"
    added: "2026-03-01"
    status: "✅ IMPLEMENTED"
    semantics: |
      Returns field values with securestring fields UNMASKED (plaintext).
      Non-securestring fields included with their normal value.
      Missing fields silently omitted.
      Human output: 'key: value' lines.
      Also available as JSON IO command 'unmask':
        record: {"command":"unmask","params":{"record_id":"REC-001","fields":["f1","f2"]}}
        note:   {"command":"unmask","params":{"record_id":"REC-001","note_id":"NT-001","fields":["f1"]}}
    key_methods:
      - "_unmask_fields(fields_arg, kv_strings, kv_integers, kv_floats, kv_secure) -> dict"
      - "_cmd_record_unmask(args)"
      - "_cmd_note_unmask(args)"
      - "_execute_json_command 'unmask' branch"

  - feature: "admin validate command"
    command: "aver admin validate [RECORD_ID ...] [--failed-list]"
    added: "2026-03-01"
    status: "✅ IMPLEMENTED"
    semantics: |
      Checks every on-disk record (or specific IDs) against:
        1. Required-field presence (template-aware via get_special_fields_for_template)
        2. accepted_values constraints for string/integer/float fields
      Normal output: summary of conforming vs non-conforming counts, each failure
      printed as "FAIL  RECORD_ID: <reason>", hint to use --failed-list.
      --failed-list: prints only failing record IDs one per line; exits 1 if any fail,
      0 if all pass (or no records found).
    handler: "_cmd_admin_validate(self, args)"
    handler_line: "~9912"

  - feature: "is_system_update system_value for notes"
    added: "2026-03-01"
    status: "✅ IMPLEMENTED"
    semantics: |
      A new system_value token "is_system_update" for note special fields (value_type="integer").
      Resolves to "1" for system-generated notes (initial record creation note, record update
      tracking note) and "0" for user-created notes (note add).
      Configured as editable=false in config.toml; auto-populated on every note creation.
      Enables filtering: ksearch is_system_update=1 (system only), ksearch is_system_update=0 (user only).
    key_methods:
      - "SystemValueDeriver.derive_value(..., is_system_note=False) — new param, returns '1'/'0'"
      - "_apply_special_fields(..., is_system_note=False) — new param, passed to derive_value"
      - "update_incident_info() — passes is_system_note=True to _apply_special_fields"
      - "create_incident() initial note — passes is_system_note=True to _apply_special_fields"
    config_example: |
      [note_special_fields.is_system_update]
      type = "single"
      value_type = "integer"
      editable = false
      system_value = "is_system_update"
      index_values = true

  - feature: "securestring value_type for SpecialField"
    added: "2026-02-28"
    status: "✅ IMPLEMENTED"
    semantics: |
      A new value_type="securestring" for special fields (both global and template-scoped,
      both record and note fields). Secure values are stored PLAINTEXT in markdown frontmatter
      (source of truth) but are masked as {securestring} in all user-facing output.
      A parallel kv_secure: Optional[Dict[str, List[str]]] dict lives on Incident and
      IncidentUpdate alongside kv_strings/kv_integers/kv_floats.
      A new value_secure TEXT column in kv_store (with schema migration via ALTER TABLE)
      holds the indexed plaintext for search.
      Supported search operators: = (equality JOIN), != (exclusion subquery), ^ (IN-list JOIN).
      Comparison operators (>, <, >=, <=) are NOT supported for securestring.
      Masking applies in: record view, note view, record list, note search, JSON export,
      JSON IO responses, post-create summary. Editor shows {securestring} mask for editable
      secure fields; if left unchanged, original value is restored.
      Non-editable securestring fields are never shown in the editor and are restored from
      the original after editing.
    key_structures:
      - "Incident.kv_secure: Dict[str, List[str]] — parallel to kv_strings"
      - "IncidentUpdate.kv_secure: Optional[Dict[str, List[str]]]"
      - "kv_store.value_secure TEXT — indexed plaintext, never surfaced in output"
    key_methods:
      - "_flatten_kv_data(..., kv_secure=...) — adds {securestring} mask to flat dict"
      - "_prepare_incident_for_editing() — writes mask for editable secure fields"
      - "_restore_non_editable_fields() — restores non-editable secure fields; applies mask-value check for editable"
      - "search_kv() — equality/IN/exclusion JOINs include value_secure column"
      - "index_kv_data() / index_update_kv_data() — 4th loop inserts into value_secure"
    mask_value: '"{securestring}"'
    docs:
      - "docs/MANUAL.md — Secure Fields section under Section 6"
      - "docs/json/IO_PROTOCOL.md — Secure Field Masking section"

  - feature: "file_index table and file_hash system value"
    added: "2026-02-27"
    status: "✅ IMPLEMENTED"
    semantics: |
      incidents_index (id TEXT, indexed_at TEXT) replaced by file_index
      (id INTEGER PK AUTOINCREMENT, file_path TEXT UNIQUE, file_hash TEXT, file_mtime TEXT).
      Every index_incident() and index_update() call now writes an entry to file_index
      with the MD5 of file content and filesystem mtime.
      At write-then-index call sites, save_incident()/save_update() return the written
      content string so it is passed as file_content= to avoid re-serialization drift
      and ensure mtime is always read after the write completes.
      Migration: _ensure_schema() drops old incidents_index and creates file_index.
      list_incidents_from_index() base query changed from incidents_index to incidents_fts.
      'file_hash' is NOT a system_value — it lives only in file_index.
      New helpers: _md5_of_content(), _mtime_of_path() on IncidentIndexDatabase.
      New method: remove_file_from_index(file_path).
    key_methods:
      - "_md5_of_content(content) -> str  (~line 3010)"
      - "_mtime_of_path(path) -> str  (~line 3015)"
      - "remove_file_from_index(file_path)  (~line 3237)"

  - feature: "^ (in) operator for ksearch"
    syntax: "status^open|closed|resolved"
    added: "2026-02-27"
    status: "✅ IMPLEMENTED"
    semantics: |
      Pipe-delimited IN-list filter. Records/notes where the field value
      matches ANY of the listed values. Multiple --ksearch flags remain AND logic.
      Implemented as an INNER JOIN with IN(?,?,...) placeholders for float/int/string.
      Works for record list, note search, and JSON IO search-records/search-notes.
    example: "aver record list --ksearch 'status^open|closed'"
    json_io_usage: '{"command": "search-records", "params": {"ksearch": ["status^open|closed"]}}'
    bugfix_note: |
      Incident.from_markdown() special-field path was storing raw YAML values into
      kv_strings without str() conversion. YAML auto-parses datetime-like strings
      (e.g. "2026-02-27 14:30:00") as datetime objects, causing json.dumps() to fail
      with "Object of type datetime is not JSON serializable". Fixed at lines ~494, 503,
      517, 526 in Incident.from_markdown() by applying str() consistently.

  - feature: "--max flag for record list and JSON IO search-records"
    commands:
      - "aver record list --ksort KEY --max KEY"
      - "aver record list --ksort KEY --max KEY1,KEY2"
      - "aver record list --ksort KEY --max KEY1 --max KEY2"
    added: "2026-02-24"
    status: "✅ IMPLEMENTED"
    semantics: |
      Runs the full query (ksearch+ksort+limit) as a working set, then
      post-filters to records holding the max value for any specified key (OR).
      Keys evaluated independently. Requires --ksort.
    json_io_usage: '{"command": "search-records", "params": {"ksort": "severity", "max": ["severity"]}}'
    helper_method: "_apply_max_filter(results, max_keys) -> list"
    helper_line: "~7780  (after _flatten_kv_data)"

  - feature: "admin template-data command"
    commands:
      - "aver admin template-data [template_id]"
    added: "2026-02-27"
    status: "✅ IMPLEMENTED"
    semantics: |
      Shows record_fields and note_fields for a given template (or global
      defaults if no template_id). Prints human-readable output.
      Via JSON IO, returns structured data for UI pre-validation:
      template_id, record_prefix, note_prefix, record_fields, note_fields
      (each with type, value_type, editable, required, accepted_values,
      default, system_value).
      Omitting template_id (JSON IO) returns global defaults.
    json_io_usage: '{"command": "template-data", "params": {"template_id": "bug"}}'
    json_io_global: '{"command": "template-data", "params": {}}'
    helper_method: "_build_template_data(project_config, template_id) -> dict"
    cli_handler: "_cmd_admin_template_data(args)"

  - feature: "--count flag for record list and note search"
    commands:
      - "aver record list --ksearch KEY=VAL --count"
      - "aver note search --ksearch KEY=VAL --count"
    added: "2026-02-24"
    status: "✅ IMPLEMENTED"
    note: "Returns only an integer count. --count requires --ksearch for record list. Also adds count_only parameter to JSON IO search-records and search-notes commands."
    json_io_usage: '{"command": "search-records", "params": {"ksearch": "status=open", "count_only": true}}'

  - feature: "Unified reindex command with skip-on-unchanged optimization"
    command: "aver admin reindex [RECORD_ID ...] [--force] [--skip-mtime] [--verbose]"
    added: "2026-02-27"
    status: "✅ IMPLEMENTED"
    note: "No RECORD_IDs = full reindex; one or more RECORD_IDs = selective. Skips files where mtime unchanged; falls back to MD5 hash check if mtime differs. --force bypasses all skip checks. --skip-mtime bypasses mtime shortcut and always compares MD5 hashes. Also available as JSON IO command 'reindex'."
    json_io_usage: '{"command": "reindex", "params": {"record_ids": ["REC-123"], "force": false, "skip_mtime": false}}'

  - feature: "Admin get-id command"
    command: "aver admin get-id"
    added: "2025-02-21"
    purpose: "Get current user handle for scripts"

  - feature: "Multi-value field operations"
    syntax: "--text-multi field+value, field-value"
    added: "Earlier version"

  - feature: "For-record parameter"
    usage: "IncidentManager methods accept for_record parameter"
    purpose: "Support templates with different field sets"

