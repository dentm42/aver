# ============================================================================
# CRITICAL: Record-as-Note Behavior (MUST READ FOR TESTS)
# ============================================================================

critical_testing_note:
  record_storage:
    issue: |
      Aver stores the initial record content as a NOTE, not in the record file.
      This causes note count assertions to be off by one.
    
    file_structure: |
      records/REC-001.md          - Metadata only (frontmatter)
      updates/REC-001/
        NT-001.md                 - The record content (counted as first note!)
        NT-002.md                 - First actual comment
        NT-003.md                 - Second comment
    
    test_impact: |
      When testing note counts:
      - New record with no comments: 1 note (the record itself)
      - Add 1 comment: 2 notes total
      - Add 2 comments: 3 notes total
      - Reindex shows: "3 notes" for record + 2 comments
    
    wrong_assertions: |
      # WRONG - will fail:
      run_aver note add REC-001 --message "Comment 1"
      run_aver note add REC-001 --message "Comment 2"
      if echo "$output" | grep -q "2 notes"; then  # WRONG!
    
    correct_assertions: |
      # CORRECT - accounts for record as first note:
      run_aver note add REC-001 --message "Comment 1"
      run_aver note add REC-001 --message "Comment 2"
      if echo "$output" | grep -q "3 notes"; then  # 1 record + 2 comments
    
    reindex_behavior: |
      aver record reindex REC-001
      # Output: "Reindexed REC-001 (3 notes)"
      #         ^^^^ Includes the record itself
    
    note_list_behavior: |
      aver note list REC-001
      # Shows: NT-001 (the record)
      #        NT-002 (first comment)
      #        NT-003 (second comment)
    
    minimum_note_count: |
      A record ALWAYS has at least 1 note (itself).
      "Record with no notes" is impossible.
      Tests should expect minimum 1 note, not 0.

