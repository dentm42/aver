# ============================================================================
# Helper Functions Usage
# ============================================================================

helpers:
  print_section:
    usage: 'print_section "Test Suite Name"'
    description: "Print blue section header"
    example: 'print_section "Test: Basic Record Creation"'
  
  print_test:
    usage: 'print_test "Test description"'
    description: "Start a new test, increments counter"
    example: 'print_test "Create a simple record"'
  
  pass:
    usage: "pass"
    description: "Mark test as passed, print green PASS"
    side_effects: "Increments TESTS_PASSED"
  
  fail:
    usage: 'fail "Reason for failure"'
    description: "Mark test as failed, print red FAIL"
    side_effects: "Increments TESTS_FAILED, tracks failure details"
  
  track_command:
    usage: 'track_command "command description"'
    description: "Track command for failure reporting (when not using run_aver)"
    example: 'track_command "manual sed command on file"'
  
  run_aver:
    usage: 'run_aver <args>'
    description: "Execute aver with test environment"
    example: 'run_aver record new --title "Test"'
    automatic: "Tracks command automatically"
  
  check_file_exists:
    usage: 'if check_file_exists "$file"; then'
    description: "Check if file exists"
    returns: "0 if exists, 1 if not"
  
  check_content_contains:
    usage: 'if check_content_contains "$file" "pattern"; then'
    description: "Check if file contains pattern"
    returns: "0 if found, 1 if not"

# ============================================================================
# Common Test Patterns
# ============================================================================

patterns:
  basic_test:
    pattern: |
      print_test "Test description"
      if run_aver <command>; then
          pass
      else
          fail "Error message"
      fi
  
  test_with_output_validation:
    pattern: |
      print_test "Test with output check"
      if output=$(run_aver <command> 2>&1); then
          if echo "$output" | grep -q "expected pattern"; then
              pass
              echo "  Additional success message"
          else
              fail "Output doesn't match expected pattern"
          fi
      else
          fail "Command failed"
      fi
  
  test_should_fail:
    pattern: |
      print_test "Test that should fail"
      set +e  # Disable exit on error
      track_command "command that should fail"
      output=$(run_aver <command> 2>&1)
      exit_code=$?
      set -e  # Re-enable exit on error
      
      if [ $exit_code -ne 0 ]; then
          if echo "$output" | grep -qi "expected error"; then
              pass
              echo "  Correctly reported error"
          else
              fail "Failed but wrong error message"
          fi
      else
          fail "Should have failed but succeeded"
      fi
  
  test_file_content:
    pattern: |
      print_test "File content verification"
      local file="$TEST_DIR/records/REC-001.md"
      if check_file_exists "$file"; then
          if check_content_contains "$file" "expected content"; then
              pass
          else
              fail "File missing expected content"
          fi
      else
          fail "File doesn't exist"
      fi
  
  test_with_manual_file_edit:
    pattern: |
      print_test "Manual file edit then verify"
      local file="$TEST_DIR/records/REC-001.md"
      track_command "sed command to edit file"
      
      sed -i 's/old/new/' "$file"
      
      if run_aver record reindex "REC-001" 2>&1 >/dev/null; then
          if output=$(run_aver record list --ksearch field=value); then
              if echo "$output" | grep -q "REC-001"; then
                  pass
              else
                  fail "Manual edit not reflected"
              fi
          fi
      fi

# ============================================================================
# Test Creation Guidelines
# ============================================================================

guidelines:
  structure:
    - "Create test function: test_feature_name()"
    - "Start with print_section"
    - "Create setup records if needed"
    - "Each assertion is one print_test/pass/fail cycle"
    - "Clean up is automatic (whole TEST_DIR is removed)"
  
  naming:
    function: "test_<feature>_<aspect>()"
    test_name: "Short description of what's being tested"
    example: 'print_test "Reindex existing record"'
  
  error_handling:
    - "Use set +e before commands expected to fail"
    - "Always set -e after to restore error handling"
    - "Capture output with: output=$(command 2>&1)"
    - "Check exit code: if [ $exit_code -ne 0 ]; then"
  
  assertions:
    - "File exists: check_file_exists"
    - "Content match: check_content_contains or grep -q"
    - "Command success: if run_aver ...; then"
    - "Output validation: echo \"$output\" | grep -q"
  
  tracking:
    - "run_aver tracks commands automatically"
    - "For manual commands: track_command \"description\""
    - "This helps debug failures"

# ============================================================================
# Adding New Tests
# ============================================================================

how_to_add_tests:
  step1:
    description: "Create new test function"
    location: "Before main() function (around line 2890)"
    template: |
      test_new_feature() {
          print_section "Test: New Feature"
          
          # Setup
          print_test "Setup: Create test data"
          local rec=$(run_aver record new --title "Test")
          if [ -n "$rec" ]; then
              pass
          else
              fail "Setup failed"
              return
          fi
          
          # Test 1
          print_test "First test case"
          if run_aver <command>; then
              pass
          else
              fail "Test failed"
          fi
          
          # Test 2, 3, etc...
      }
  
  step2:
    description: "Add function call to main()"
    location: "In main() function around line 2953"
    example: |
      # Run test suites
      test_basic_creation
      test_special_characters
      # ... existing tests ...
      test_new_feature  # ← Add here
  
  step3:
    description: "Run tests"
    command: "./test_aver.sh"
    debug: "./test_aver.sh --keep --verbose"

